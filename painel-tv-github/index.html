<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel TV</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #slide {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
      opacity: 1;
      transition: opacity 0.8s ease-in-out;
    }

    #slide.fade-out {
      opacity: 0.15;
    }

    .status {
      position: absolute;
      right: 16px;
      bottom: 16px;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      background: rgba(0,0,0,0.35);
      letter-spacing: 0.2px;
      user-select: none;
    }

    .erro {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 20px;
      text-align: center;
      padding: 24px;
    }

    .erro.show {
      display: flex;
    }
  </style>
</head>
<body>
  <div class="app">
    <img id="slide" alt="Slide em exibição" />
    <div id="erro" class="erro">Nenhuma imagem disponível.</div>
    <div id="status" class="status">Iniciando...</div>
  </div>

  <script>
    const TEMPO_SLIDE = 15000;       // 15 segundos
    const TEMPO_RELOAD = 60000;      // 1 minuto
    const ARQUIVO_LISTA = "images.json";

    let imagens = [];
    let indice = 0;
    let timerSlides = null;

    const slide = document.getElementById("slide");
    const statusBox = document.getElementById("status");
    const erroBox = document.getElementById("erro");

    async function carregarLista() {
      try {
        const resposta = await fetch(`${ARQUIVO_LISTA}?t=${Date.now()}`, {
          cache: "no-store"
        });

        if (!resposta.ok) {
          throw new Error("Falha ao ler images.json");
        }

        const lista = await resposta.json();

        if (!Array.isArray(lista) || lista.length === 0) {
          throw new Error("A lista de imagens está vazia.");
        }

        imagens = lista.filter(item => typeof item === "string" && item.trim() !== "");

        if (imagens.length === 0) {
          throw new Error("Nenhuma imagem válida encontrada.");
        }

        statusBox.textContent = `${imagens.length} imagem(ns) carregada(s)`;
        erroBox.classList.remove("show");
        slide.style.display = "block";

        if (indice >= imagens.length) {
          indice = 0;
        }

        mostrarImagem(indice);
        iniciarLoop();
      } catch (erro) {
        console.error(erro);
        statusBox.textContent = "Erro ao carregar imagens";
        erroBox.classList.add("show");
        slide.style.display = "none";
      }
    }

    function mostrarImagem(posicao) {
      if (!imagens.length) return;

      slide.classList.add("fade-out");

      setTimeout(() => {
        slide.src = `${imagens[posicao]}?v=${Date.now()}`;
        slide.onload = () => {
          slide.classList.remove("fade-out");
        };
        slide.onerror = () => {
          statusBox.textContent = `Erro ao abrir: ${imagens[posicao]}`;
          slide.classList.remove("fade-out");
        };
      }, 250);
    }

    function proximaImagem() {
      if (!imagens.length) return;
      indice = (indice + 1) % imagens.length;
      mostrarImagem(indice);
    }

    function iniciarLoop() {
      if (timerSlides) {
        clearInterval(timerSlides);
      }
      timerSlides = setInterval(proximaImagem, TEMPO_SLIDE);
    }

    async function iniciar() {
      await carregarLista();

      setInterval(() => {
        location.reload();
      }, TEMPO_RELOAD);
    }

    iniciar();
  </script>
</body>
</html>
